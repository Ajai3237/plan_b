<!DOCTYPE html>
<html lang="en">
  {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>admin_page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
          }
      
          body {
            font-family: 'Open Sans', sans-serif;
            background-color: #090912;
          }
      
          .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
          }
      
          .form-container {
            width: 600px;
            margin: 0 auto;
            padding: 50px;
            background-color: #090912;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            color: #fff;
            border: 1px solid rgb(255 255 255 / 15%);
          }
      
          h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
            color: #e93743;
          }
      
          form {
            display: flex;
            flex-direction: column;
          }
      
          label {
            margin-bottom: 10px;
            font-size: 18px;
          }
      
          input {
            padding: 12px;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 16px;
            color: #fff;
            background-color: #555;
          }
      
          button {
            padding: 10px;
            background-color: #e93743;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.2s ease-in-out;
          }
      
          button:hover {
            background-color: #ff515d;
          }
      
          a {
            text-decoration: none;
            color: #b38bff;
            font-size: 18px;
            transition: color 0.2s ease-in-out;
          }
      
          a:hover {
            color: #8c5fb2;
          }
      
          p {
            text-align: center;
            margin: 8px;
          }
    </style>
</head>
<body>


    <div class="container">
        <div class="form-container" id="login-form">
          <h1>Login <img style="width: 50px;
            height: 50px;" src="{% static "crm/assets/img/N1Security.png" %}"  alt=""></h1>
          <form method="post" action="">
            {% csrf_token %}
            <label for="email">Email</label>
            <input type="text" id="email" name="email" placeholder="Email" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
          </form>
          
         
        </div>
      </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>


    <script>
        toastr.options = {
            "closeButton": false,
            "debug": false,
            "newestOnTop": false,
            "progressBar": true,
            "positionClass": "toast-bottom-right",
            "preventDuplicates": false,
            "onclick": null,
            "showDuration": "1000",
            "hideDuration": "1000",
            "timeOut": "5000",
            "extendedTimeOut": "1000",
            "showEasing": "swing",
            "hideEasing": "linear",
            "showMethod": "slideDown",
            "hideMethod": "slideUp"
        };

        // Display Toastr notifications based on Django messages
        {% for message in messages %}
            if ("{{ message.tags }}" === "success") {
            toastr.success("{{ message|safe }}");
            } else if ("{{ message.tags }}" === "error") {
            toastr.error("{{ message }}");
            } else if ("{{ message.tags }}" === "info") {
            toastr.info("{{ message|safe }}");
            } else if ("{{ message.tags }}" === "warning") {
            toastr.warning("{{ message|safe }}");
            }
        {% endfor %}
    </script>
</html>
